<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FS Factbase | Continuous Pipeline</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Heavy blobs removed for performance (Lighter Feel) -->
    
    <div class="container">
        <header>
            <div class="logo">
                <span class="active-indicator"></span>
                <h1>FS Factbase</h1>
                <p class="subtitle">Autonomous Financial Extraction</p>
            </div>
            <div class="header-badges">
                <div id="status-badge" class="badge paused">PAUSED</div>
            </div>
        </header>

        <main>
            <div class="grid">
                <!-- Status & Control Card -->
                 <div class="card status-card">
                    <h2>Pipeline Control</h2>
                    <div class="info-group">
                        <p class="label">CURRENT FOCUS</p>
                        <h3 id="current-task">Idle</h3>
                    </div>
                    <div class="controls">
                        <button id="btn-start" class="btn btn-primary">RESUME LOOP</button>
                        <button id="btn-pause" class="btn btn-secondary">PAUSE</button>
                    </div>
                 </div>

                 <!-- Stats Card -->
                 <div class="card stats-card">
                    <h2>Factbase Coverage</h2>
                    <div class="stats-grid">
                        <div class="stat-item">
                            <span class="stat-value" id="total-facts">0</span>
                            <span class="stat-label">Total Facts</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-value" id="unmapped-count">0</span>
                            <span class="stat-label">Unmapped</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-value" id="core-metrics">0</span>
                            <span class="stat-label">Core Metrics</span>
                        </div>
                    </div>
                 </div>

                 <!-- Dictionary Expansion Indicator -->
                 <div class="card expansion-card">
                    <div class="card-header-flex">
                        <h2>Dictionary Expansion</h2>
                        <div id="expansion-badge" class="badge idle">IDLE</div>
                    </div>
                    <div class="expansion-info">
                        <p class="label">LAST RESOLUTION YIELD</p>
                        <p class="yield-value"><span id="expansion-count">0</span> terms</p>
                    </div>
                 </div>

                 <!-- Activity Log Card (Wide) -->
                 <div class="card activity-card">
                    <h2>Activity Log</h2>
                    <div id="activity-list" class="activity-list">
                        <div class="activity-item">Initializing tracker...</div>
                    </div>
                 </div>

                 <!-- Recent Facts Card (Wide) -->
                 <div class="card facts-card">
                    <h2>Live Extraction Stream</h2>
                    <div id="facts-list" class="facts-list">
                         <div class="fact-item">Awaiting data...</div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="ui.js"></script>
</body>
</html>
